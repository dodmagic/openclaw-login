<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw - 登录门户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 48px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .user-info {
            background: #f0f6ff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            display: none;
        }

        .user-info p {
            color: #333;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .user-info .username {
            font-weight: 600;
            font-size: 16px;
            color: #0078d4;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0078d4;
            color: white;
        }

        .btn-primary:hover {
            background: #005a9e;
        }

        .btn-logout {
            background: transparent;
            color: #666;
            font-size: 13px;
            padding: 8px 16px;
            margin-top: 16px;
        }

        .btn-logout:hover {
            color: #333;
        }

        .loading {
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>OpenClaw</h1>
        <p class="subtitle">请使用企业账号登录以访问服务</p>

        <div id="loading" class="loading">正在检查登录状态...</div>

        <div id="login-section" style="display:none;">
            <a href="/.auth/login/aad?post_login_redirect_uri=/" class="btn btn-primary">
                使用 Microsoft 账号登录
            </a>
        </div>

        <div id="authenticated-section" style="display:none;">
            <div class="user-info" id="user-info">
                <p>欢迎回来</p>
                <p class="username" id="username"></p>
            </div>
            <a href="https://openclaw.sdnyun.com/" class="btn btn-primary" id="enter-btn">
                进入 OpenClaw 服务
            </a>
            <br>
            <a href="/.auth/logout" class="btn btn-logout">退出登录</a>
        </div>
    </div>

    <script>
        (async function () {
            const loadingEl = document.getElementById('loading');
            const loginEl = document.getElementById('login-section');
            const authEl = document.getElementById('authenticated-section');
            const userInfoEl = document.getElementById('user-info');
            const usernameEl = document.getElementById('username');

            try {
                const res = await fetch('/.auth/me');
                const data = await res.json();
                const user = data.clientPrincipal;

                loadingEl.style.display = 'none';

                if (user) {
                    usernameEl.textContent = user.userDetails || user.userId;
                    userInfoEl.style.display = 'block';
                    authEl.style.display = 'block';
                } else {
                    loginEl.style.display = 'block';
                }
            } catch (e) {
                loadingEl.style.display = 'none';
                loginEl.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
